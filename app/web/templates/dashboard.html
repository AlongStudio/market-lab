<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>market-lab 管理面板</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; margin: 0;
         background: #f5f6f8; color: #1f2329; }
  header { background: #1f2329; color: #fff; padding: 14px 24px; font-size: 18px; }
  .wrap { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
           gap: 14px; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 8px; padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .card .label { font-size: 12px; color: #8a8f99; }
  .card .value { font-size: 20px; font-weight: 600; margin-top: 6px; }
  .bar { height: 10px; background: #e8eaed; border-radius: 5px; overflow: hidden; margin-top: 8px; }
  .bar > i { display: block; height: 100%; background: #2f7cf6; }
  section { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 20px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  h2 { font-size: 15px; margin: 0 0 12px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
  th { color: #8a8f99; font-weight: 500; }
  button { background: #2f7cf6; color: #fff; border: 0; padding: 6px 14px;
           border-radius: 6px; cursor: pointer; font-size: 13px; }
  button:hover { background: #1f6ae0; }
  .muted { color: #8a8f99; font-size: 12px; }
  .err { color: #8a8f99; font-size: 12px; max-width: 300px; word-break: break-word; }
  .stat-row { display: flex; gap: 20px; margin-bottom: 12px; font-size: 12px; }
  .stat-item { flex: 1; }
  .stat-label { color: #8a8f99; margin-bottom: 2px; }
  .stat-value { color: #1f2329; font-weight: 500; }
  .status-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 12px;
                  font-weight: 500; }
  .status-success { background: #e8f5e9; color: #2e7d32; }
  .status-failed { background: #ffebee; color: #c62828; }
  .status-pending { background: #e3f2fd; color: #1565c0; }
  .tabs { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 1px solid #eee; }
  .tab { padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; color: #8a8f99; }
  .tab.active { border-bottom-color: #2f7cf6; color: #2f7cf6; font-weight: 500; }
  .pager { display: flex; align-items: center; gap: 10px; margin-top: 12px; font-size: 13px; }
  .pager button { padding: 4px 10px; }
  .pager button:disabled { background: #c9d2dd; cursor: not-allowed; }
  .pager .info { color: #8a8f99; }
  .filters { display: flex; gap: 10px; margin-bottom: 12px; }
  .filters input, .filters select { padding: 6px 10px; border: 1px solid #dcdfe6;
                                     border-radius: 6px; font-size: 13px; }
  .filters input { flex: 1; max-width: 260px; }
  th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  th.sortable:hover { color: #2f7cf6; }
  th.sortable .arrow { display: inline-block; width: 10px; color: #2f7cf6; }
</style>
</head>
<body>
<header>market-lab 管理面板</header>
<div class="wrap">
  <div class="cards" id="cards"></div>

  <section>
    <h2>采集进度</h2>
    <div class="bar"><i id="progressBar" style="width:0%"></i></div>
    <div class="muted" id="progressText" style="margin-top:8px"></div>
  </section>

  <section>
    <h2>股票数据分布 <span class="muted" id="statsRefreshed" style="font-weight:400"></span></h2>
    <div class="filters">
      <input id="filterName" type="text" placeholder="按股票名称筛选…" oninput="onFilterChange()">
      <select id="filterStatus" onchange="onFilterChange()">
        <option value="">全部状态</option>
        <option value="NORMAL">NORMAL</option>
        <option value="SUSPENDED">SUSPENDED</option>
        <option value="DELISTED">DELISTED</option>
      </select>
    </div>
    <table>
      <thead><tr>
        <th class="sortable" data-sort="code" onclick="onSort('code')">股票代码<span class="arrow"></span></th>
        <th>股票名称</th><th>状态</th>
        <th class="sortable" data-sort="daily" onclick="onSort('daily')">日K<span class="arrow"></span></th>
        <th class="sortable" data-sort="weekly" onclick="onSort('weekly')">周K<span class="arrow"></span></th>
        <th class="sortable" data-sort="monthly" onclick="onSort('monthly')">月K<span class="arrow"></span></th>
        <th class="sortable" data-sort="minute" onclick="onSort('minute')">分钟K<span class="arrow"></span></th>
        <th>日K 日期范围</th>
      </tr></thead>
      <tbody id="stockBody"></tbody>
    </table>
    <div class="pager">
      <button id="prevPage" onclick="changePage(-1)">上一页</button>
      <span class="info" id="pageInfo">-</span>
      <button id="nextPage" onclick="changePage(1)">下一页</button>
    </div>
  </section>

  <section>
    <h2>任务执行历史</h2>
    <div class="tabs">
      <div class="tab active" onclick="switchTab(event, 'recent-success')">最近成功 (10)</div>
      <div class="tab" onclick="switchTab(event, 'recent-fail')">最近失败 (10)</div>
      <div class="tab" onclick="switchTab(event, 'all-failed')">所有失败 <button onclick="retryAll()" style="float:right; margin-top: -2px;">批量重试</button></div>
    </div>

    <div id="recent-success" class="tab-content">
      <table>
        <thead><tr><th>股票代码</th><th>数据类型</th><th>口径</th><th>完成时间</th></tr></thead>
        <tbody id="successBody"></tbody>
      </table>
    </div>

    <div id="recent-fail" class="tab-content" style="display:none">
      <table>
        <thead><tr><th>股票代码</th><th>数据类型</th><th>口径</th><th>重试次数</th><th>错误原因</th><th>完成时间</th></tr></thead>
        <tbody id="recentFailBody"></tbody>
      </table>
    </div>

    <div id="all-failed" class="tab-content" style="display:none">
      <table>
        <thead><tr><th>ID</th><th>股票代码</th><th>数据类型</th><th>口径</th><th>重试次数</th><th>错误原因</th><th></th></tr></thead>
        <tbody id="allFailBody"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function formatDate(d) {
  if (!d) return '-';
  if (typeof d === 'string') return d;
  return new Date(d).toLocaleDateString('zh-CN');
}

function formatTime(d) {
  if (!d) return '-';
  if (typeof d === 'string') {
    const dt = new Date(d);
    return dt.toLocaleString('zh-CN', {hour12: false});
  }
  return d.toLocaleString('zh-CN', {hour12: false});
}

function friendlyError(msg) {
  if (!msg) return '-';
  const lines = msg.split('\n');
  let friendly = lines[0];
  if (friendly.includes('Connection')) friendly = '网络连接错误';
  else if (friendly.includes('timeout')) friendly = '超时';
  else if (friendly.includes('not found')) friendly = '数据不存在';
  else if (friendly.includes('KeyError')) {
    const match = msg.match(/KeyError: '(\w+)'/);
    friendly = match ? `缺少字段: ${match[1]}` : '数据字段缺失';
  }
  return friendly.substring(0, 100);
}

async function loadCards() {
  const d = await api('/api/data/overview');
  const cards = [
    ['股票总数', d.stocks ? d.stocks.rows : '-'],
    ['日K 行数', d.daily ? d.daily.rows : '-'],
    ['日K 最新', (d.daily && d.daily.latest_date) || '-'],
    ['周K 行数', d.weekly ? d.weekly.rows : '-'],
    ['月K 行数', d.monthly ? d.monthly.rows : '-'],
    ['分钟K 行数', d.minute ? d.minute.rows : '-'],
    ['分钟K 分表', d.minute ? d.minute.tables : '-'],
  ];
  document.getElementById('cards').innerHTML = cards.map(
    ([l, v]) => `<div class="card"><div class="label">${l}</div><div class="value">${v}</div></div>`
  ).join('');
}

async function loadProgress() {
  const d = await api('/api/tasks/summary');
  document.getElementById('progressBar').style.width = d.progress + '%';
  const parts = Object.entries(d.counts).map(([k, v]) => `${k}: ${v}`).join('  ·  ');
  document.getElementById('progressText').textContent =
    `进度 ${d.progress}%  ·  总任务 ${d.total}  ·  ${parts}`;
}

const PAGE_SIZE = 50;
let curPage = 1;
let totalStocks = 0;
let curSort = 'code';
let curOrder = 'asc';
let filterTimer = null;

// 股票分布、最近成功/失败共用同一次 details 请求,避免重复打这个聚合接口
async function loadDetails() {
  const name = document.getElementById('filterName').value.trim();
  const status = document.getElementById('filterStatus').value;
  const params = new URLSearchParams({
    page: curPage, size: PAGE_SIZE, sort: curSort, order: curOrder,
  });
  if (name) params.set('name', name);
  if (status) params.set('status', status);
  const d = await api(`/api/dashboard/details?${params}`);
  totalStocks = d.total || 0;
  renderStocks(d);
  renderSuccess(d.recent_success || []);
  renderRecentFail(d.recent_fail || []);
  renderPager();
  renderSortArrows();
  document.getElementById('statsRefreshed').textContent =
    d.refreshed_at ? `（数据更新于 ${formatTime(d.refreshed_at)}）` : '';
}

function renderSortArrows() {
  document.querySelectorAll('th.sortable').forEach(th => {
    const arrow = th.querySelector('.arrow');
    arrow.textContent = th.dataset.sort === curSort ? (curOrder === 'asc' ? '▲' : '▼') : '';
  });
}

function onSort(field) {
  if (curSort === field) {
    curOrder = curOrder === 'asc' ? 'desc' : 'asc';
  } else {
    curSort = field;
    curOrder = field === 'code' ? 'asc' : 'desc';  // 数量列默认从多到少更直觉
  }
  curPage = 1;
  loadDetails();
}

function onFilterChange() {
  // 输入防抖,避免每键一次请求
  clearTimeout(filterTimer);
  filterTimer = setTimeout(() => { curPage = 1; loadDetails(); }, 400);
}

function renderStocks(d) {
  const rows = d.stocks.map(stock => {
    const code = stock.stock_code;
    const stats = d.kline_stats[code] || {};
    const minute = d.minute_stats[code] || {};
    const dateRange = stats.daily_min_date && stats.daily_max_date
      ? `${stats.daily_min_date} ~ ${stats.daily_max_date}`
      : '-';
    return `<tr>
      <td>${code}</td>
      <td>${stock.stock_name}</td>
      <td><span class="status-badge ${stock.status === 'NORMAL' ? 'status-success' : (stock.status === 'DELISTED' ? 'status-failed' : 'status-pending')}">
        ${stock.status}</span></td>
      <td>${stats.daily_rows || 0}</td>
      <td>${stats.weekly_rows || 0}</td>
      <td>${stats.monthly_rows || 0}</td>
      <td>${minute.rows || 0}</td>
      <td class="muted">${dateRange}</td>
    </tr>`;
  }).join('');
  document.getElementById('stockBody').innerHTML = rows || '<tr><td colspan="8" class="muted">无股票数据</td></tr>';
}

function renderSuccess(list) {
  const rows = list.map(t => `<tr>
    <td>${t.stock_code}</td>
    <td>${t.data_type}</td>
    <td>${t.adjust || '-'}</td>
    <td class="muted">${formatTime(t.finished_at)}</td>
  </tr>`).join('');
  document.getElementById('successBody').innerHTML = rows || '<tr><td colspan="4" class="muted">无成功任务</td></tr>';
}

function renderRecentFail(list) {
  const rows = list.map(t => `<tr>
    <td>${t.stock_code}</td>
    <td>${t.data_type}</td>
    <td>${t.adjust || '-'}</td>
    <td>${t.retry_count || 0}</td>
    <td class="err" title="${(t.error||'').replace(/"/g,'&quot;')}">${friendlyError(t.error)}</td>
    <td class="muted">${formatTime(t.finished_at)}</td>
  </tr>`).join('');
  document.getElementById('recentFailBody').innerHTML = rows || '<tr><td colspan="6" class="muted">无失败任务</td></tr>';
}

function renderPager() {
  const totalPages = Math.max(1, Math.ceil(totalStocks / PAGE_SIZE));
  document.getElementById('pageInfo').textContent =
    `第 ${curPage} / ${totalPages} 页  ·  共 ${totalStocks} 只`;
  document.getElementById('prevPage').disabled = curPage <= 1;
  document.getElementById('nextPage').disabled = curPage >= totalPages;
}

function changePage(delta) {
  const totalPages = Math.max(1, Math.ceil(totalStocks / PAGE_SIZE));
  const next = curPage + delta;
  if (next < 1 || next > totalPages) return;
  curPage = next;
  loadDetails();
}

async function loadAllFailed() {
  const d = await api('/api/tasks?status=FAILED&size=100');
  const rows = d.data.map(t => `<tr>
    <td>${t.id}</td>
    <td>${t.stock_code}</td>
    <td>${t.data_type}</td>
    <td>${t.adjust || '-'}</td>
    <td>${t.retry_count || 0}</td>
    <td class="err" title="${(t.last_error||'').replace(/"/g,'&quot;')}">${friendlyError(t.last_error)}</td>
    <td><button onclick="retryOne(${t.id})">重试</button></td>
  </tr>`).join('');
  document.getElementById('allFailBody').innerHTML = rows || '<tr><td colspan="7" class="muted">无失败任务</td></tr>';
}

function switchTab(e, tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  e.target.classList.add('active');
  document.getElementById(tabId).style.display = 'block';
}

async function retryOne(id) {
  await api(`/api/tasks/${id}/retry`, {method:'POST'});
  refresh();
}

async function retryAll() {
  await api('/api/tasks/retry-failed', {method:'POST'});
  refresh();
}

async function refresh() {
  try {
    await Promise.all([loadCards(), loadProgress(), loadDetails(), loadAllFailed()]);
  } catch (e) {
    console.error(e);
  }
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
